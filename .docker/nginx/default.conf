server {
    listen 80;
    server_name projetwptailwind.local;

    root /var/www/html/web;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/projetwptailwind_access.log;
    error_log  /var/log/nginx/projetwptailwind_error.log;

    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Removed the /wp regex location since it was trapping PHP files.

    # Pass PHP files to PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_read_timeout 300;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny direct access to sensitive Bedrock files
    location ~* /(?:\.env|composer\.json|composer\.lock)$ {
        deny all;
    }

    # Static file caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        log_not_found off;
    }
}
