services:
  mysql:
    image: mysql:8.0
    container_name: projetwp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - wpnet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    build:
      context: .docker/wordpress
      dockerfile: Dockerfile
    container_name: projetwp_php
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
    volumes:
      - .:/var/www/html:rw
    networks:
      - wpnet

  nginx:
    build:
      context: .docker/nginx
      dockerfile: Dockerfile
    container_name: projetwp_nginx
    restart: unless-stopped
    depends_on:
      - wordpress
    ports:
      - "8085:80"
    volumes:
      - .:/var/www/html:ro
    networks:
      - wpnet

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: projetwp_phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_USER: wordpress
      PMA_PASSWORD: wordpress
    ports:
      - "8090:80"
    networks:
      - wpnet

volumes:
  mysql_data:

networks:
  wpnet:
    driver: bridge
